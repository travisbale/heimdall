version: "2"
sql:
  - schema: "internal/db/postgres/migrations"
    queries: "internal/db/postgres/queries"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/postgres/internal/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              pointer: true
              type: "UUID"
          - db_type: "timestamptz"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              pointer: true
              type: "time.Time"
          - db_type: "user_status"
            nullable: false
            go_type:
              import: "github.com/travisbale/heimdall/internal/iam"
              type: "UserStatus"
          - db_type: "user_status"
            nullable: true
            go_type:
              import: "github.com/travisbale/heimdall/internal/iam"
              pointer: true
              type: "UserStatus"
          - db_type: "oidc_provider_type"
            nullable: true
            go_type:
              import: "github.com/travisbale/heimdall/sdk"
              pointer: true
              type: "OIDCProviderType"
          - db_type: "oidc_provider_type"
            nullable: false
            go_type:
              import: "github.com/travisbale/heimdall/sdk"
              pointer: false
              type: "OIDCProviderType"
          - db_type: "oidc_registration_method"
            go_type:
              import: "github.com/travisbale/heimdall/sdk"
              type: "OIDCRegistrationMethod"
          - db_type: "permission_effect"
            go_type:
              import: "github.com/travisbale/heimdall/sdk"
              type: "PermissionEffect"
